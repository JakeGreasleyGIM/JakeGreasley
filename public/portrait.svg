<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15151a" />
      <stop offset="1" stop-color="#0a0a0a" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe27a" stop-opacity="0.9" />
      <stop offset="0.5" stop-color="#d4af37" stop-opacity="0.7" />
      <stop offset="1" stop-color="#7d6116" stop-opacity="0.4" />
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.32" r="0.5">
      <stop offset="0" stop-color="#d4af37" stop-opacity="0.18" />
      <stop offset="1" stop-color="#d4af37" stop-opacity="0" />
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.6" fill="#d4af37" fill-opacity="0.18" />
    </pattern>
  </defs>
  <rect width="480" height="600" fill="url(#bgGrad)" />
  <rect width="480" height="600" fill="url(#dots)" />
  <rect width="480" height="600" fill="url(#halo)" />
  <!-- Stylized silhouette -->
  <g transform="translate(240 380)">
    <!-- Shoulders -->
    <path
      d="M -180 220 C -180 60, -100 30, -70 30 L 70 30 C 100 30, 180 60, 180 220 Z"
      fill="url(#goldGrad)"
      opacity="0.55"
    />
    <!-- Neck -->
    <rect x="-22" y="-20" width="44" height="60" fill="url(#goldGrad)" opacity="0.6" />
    <!-- Head -->
    <ellipse cx="0" cy="-90" rx="78" ry="92" fill="url(#goldGrad)" opacity="0.7" />
    <!-- Hair shadow -->
    <path d="M -78 -120 C -60 -190, 60 -190, 78 -120 L 78 -85 L -78 -85 Z" fill="#0a0a0a" opacity="0.45" />
  </g>
  <!-- Frame border -->
  <rect x="6" y="6" width="468" height="588" fill="none" stroke="#d4af37" stroke-opacity="0.35" stroke-width="1" />
  <!-- Caption marks -->
  <text x="20" y="32" fill="#d4af37" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="2">JG · MMXXVI</text>
  <text x="460" y="582" fill="#d4af37" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="2" text-anchor="end">PLATE I</text>
</svg>
